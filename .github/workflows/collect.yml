name: Collect data
on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days back to collect (use a large value, e.g. 45, to backfill gaps)'
        required: false
        default: '20'
jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'
          cache: 'pipenv'
      - name: Install pipenv
        run: curl https://raw.githubusercontent.com/pypa/pipenv/master/get-pipenv.py | python
      - name: collect
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '20' }}
          LOG_LEVEL: INFO
        run: pipenv install && pipenv run python main.py
      - name: Commit new data
        run: |
          git config --global user.name 'Collect Bot'
          git config --global user.email 'noreply@nedora.digital'
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Add data"
            git pull --rebase
            git push
            echo "✅ Committed new data ($(date -u +'%Y-%m-%d %H:%M UTC'))" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Explain failure
        if: failure()
        run: |
          {
            echo "## ❌ Collection failed"
            echo ""
            echo "The \`collect\` step produced no data. The usual cause is the EEX endpoint"
            echo "\`webservice-eex.gvsi.com\` returning an error or becoming unreachable."
            echo ""
            echo "Open the **collect** step log above and search for \`Body starts:\`,"
            echo "\`EEXUnauthorized\`, \`HTTP \`, or \`Traceback\` — those lines carry the exact"
            echo "status code and response body returned by EEX."
          } >> "$GITHUB_STEP_SUMMARY"
